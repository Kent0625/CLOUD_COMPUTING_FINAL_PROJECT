services:
  - type: web
    name: archive-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: archive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: archive-redis
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: archive-frontend
          property: envVar:RENDER_EXTERNAL_URL

  - type: web
    name: archive-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://${archive-backend.host}

  - type: redis
    name: archive-redis
    plan: free
    ipAllowList: [] 

databases:
  - name: archive-db
    plan: free
